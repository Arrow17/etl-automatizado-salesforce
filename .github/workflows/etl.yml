name: ETL-Automatico-Salesforce

on:
  schedule:
  - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  etl:
    runs-on: ubuntu-latest
    env:
      SF_USERNAME: ${{ secrets.SF_USERNAME }}
      SF_PASSWORD: ${{ secrets.SF_PASSWORD }}
      SF_SECURITY_TOKEN: ${{ secrets.SF_SECURITY_TOKEN }}
      
    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Instalar dependencias
      run: |
        pip install -r requirements.txt
    
  # ============================================================
  # 🔹 ASISTENCIA REGULAR
  # ============================================================

    - name: Ejecutar Asistencia Regular 2025 - Descargar
      env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      run: python "etl/procesos/2025/1. asistencia_regular/01_descargar.py"

    - name: Ejecutar Asistencia Regular 2025 - Transformación
      run: python "etl/procesos/2025/1. asistencia_regular/02_transformacion.py"
      
    - name: Ejecutar Consolidación - Asistencia Regular
      run: python "etl/procesos/consolidacion/1_asistencia_regular.py"
    
    - name: Ejecutar paso final - Subir a Salesforce de asistencia regular
      run: python "etl/procesos/carga/01_asistencia_regular.py"


  
